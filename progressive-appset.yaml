apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: application-set
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: infrastructure
            path: definitions/infrastructure
          - name: services
            path: definitions/services
          - name: outbox
            path: definitions/outbox
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/tomas-rojo/argocd-test.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd