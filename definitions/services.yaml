apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  generators:
    - list:
        elements:
          - name: service-a
            values: services/service-a/values.yaml
          - name: service-b
            values: services/service-b/values.yaml

  template:
    metadata:
      name: '{{name}}'

    spec:
      project: default

      sources:
        - repoURL: https://github.com/tomas-rojo/argocd-test.git
          targetRevision: main
          ref: values

        - repoURL: https://charts.bitnami.com/bitnami
          chart: nginx
          targetRevision: 22.6.1
          helm:
            valueFiles:
              - $values/{{values}}

      destination:
        server: https://kubernetes.default.svc
        namespace: app

      syncPolicy:
        automated:
          prune: true
          selfHeal: true