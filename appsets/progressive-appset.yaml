apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - name: infrastructure
        path: definitions/infrastructure.yaml
        wave: "0"
      - name: services
        path: definitions/services.yaml
        wave: "1"
      - name: outbox
        path: definitions/outbox.yaml
        wave: "2"

  template:
    metadata:
      name: 'platform-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/tomas-rojo/argocd-test.git
        targetRevision: main
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: argocd  # ⚠️ Deploy to argocd namespace (where ArgoCD lives)

      syncPolicy:
        automated:
          prune: true
          selfHeal: true